<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>父亲节快乐 · 夏至快乐</title>
<meta property="og:title" content="父亲节快乐 · 夏至快乐">
<meta property="og:description" content="白昼最长的一天，最长的爱。祝老爸父亲节快乐！">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(175deg, #fef9f0 0%, #f7eedb 30%, #efe0c6 70%, #e8d5b0 100%);
    font-family: 'STSongti', 'Songti SC', 'SimSun', '宋体', 'PingFang SC', serif;
    color: #3c2415;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    padding: 20px;
  }

  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(circle at 20% 20%, rgba(201,169,110,0.12) 0%, transparent 50%),
      radial-gradient(circle at 80% 60%, rgba(224,199,138,0.10) 0%, transparent 50%),
      radial-gradient(circle at 50% 90%, rgba(212,165,116,0.08) 0%, transparent 40%);
  }

  .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .particle {
    position: absolute; border-radius: 50%;
    background: radial-gradient(circle, #e0c78a, #c9a96e);
    animation: floatUp linear infinite; opacity: 0;
  }
  @keyframes floatUp {
    0% { transform: translateY(0) translateX(0) scale(0); opacity: 0; }
    10% { opacity: 0.7; }
    90% { opacity: 0.4; }
    100% { transform: translateY(-110vh) translateX(40px) scale(1); opacity: 0; }
  }
  @keyframes floatUpAlt {
    0% { transform: translateY(0) translateX(0) scale(0); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.3; }
    100% { transform: translateY(-110vh) translateX(-50px) scale(1.2); opacity: 0; }
  }

  .card {
    position: relative; z-index: 1;
    max-width: 520px; width: 100%;
    background: linear-gradient(170deg, #fefcf8 0%, #faf5ea 30%, #f5ecda 100%);
    border-radius: 12px;
    padding: 44px 32px 36px;
    box-shadow:
      0 2px 4px rgba(60,36,21,0.06),
      0 8px 24px rgba(60,36,21,0.08),
      0 24px 56px rgba(60,36,21,0.10);
    animation: cardIn 1s ease both;
  }

  .card::after {
    content: ''; position: absolute; top: 14px; left: 14px; right: 14px; bottom: 14px;
    border: 1.5px solid rgba(196,144,58,0.25); border-radius: 6px; pointer-events: none;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .sun-wrap { display: flex; justify-content: center; margin-bottom: 18px; }
  .sun {
    width: 80px; height: 80px; border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #fef7d5 0%, #fde68a 25%, #fbbf24 55%, #f59e0b 80%, #d97736 100%);
    box-shadow: 0 0 40px 12px rgba(251,191,36,0.3), 0 0 80px 30px rgba(245,158,11,0.15);
    animation: sunGlow 3s ease-in-out infinite;
  }
  @keyframes sunGlow {
    0%, 100% { box-shadow: 0 0 40px 12px rgba(251,191,36,0.3), 0 0 80px 30px rgba(245,158,11,0.15); }
    50% { box-shadow: 0 0 55px 18px rgba(251,191,36,0.45), 0 0 100px 40px rgba(245,158,11,0.22); }
  }

  .greeting {
    text-align: center; font-size: 18px; color: #8b6914; letter-spacing: 0.1em;
    font-family: 'STKaiti', 'KaiTi', '楷体', 'KaiTi SC', serif;
    margin-bottom: 16px; animation: fadeIn 0.8s ease 0.3s both;
  }

  .title {
    text-align: center; font-size: 48px; font-weight: 400; color: #3c2415;
    letter-spacing: 0.12em;
    font-family: 'STKaiti', 'KaiTi', '楷体', 'KaiTi SC', serif;
    margin-bottom: 6px; animation: fadeIn 0.8s ease 0.5s both;
  }

  .subtitle {
    text-align: center; font-size: 14px; color: #a07d3d; letter-spacing: 0.15em;
    margin-bottom: 22px; animation: fadeIn 0.8s ease 0.65s both;
  }

  .carousel-wrap {
    width: 100%; max-width: 340px; margin: 0 auto 18px;
    border-radius: 12px; overflow: hidden; position: relative;
    box-shadow: 0 4px 20px rgba(60,36,21,0.12);
    aspect-ratio: 4/3;
    animation: fadeIn 0.8s ease 0.8s both;
  }

  .carousel-track {
    display: flex; width: 100%; height: 100%;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .carousel-slide {
    min-width: 100%; height: 100%; flex-shrink: 0;
  }

  .carousel-slide img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }

  .carousel-dots {
    display: flex; justify-content: center; gap: 10px; margin-bottom: 22px;
    animation: fadeIn 0.8s ease 1s both;
  }

  .carousel-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #d4c5a0; cursor: pointer; transition: all 0.3s ease;
  }

  .carousel-dot.active {
    background: #c4903a; box-shadow: 0 0 8px rgba(196,144,58,0.5); transform: scale(1.4);
  }

  .body-text {
    font-size: 17px; line-height: 2.1; letter-spacing: 0.03em; color: #3c2415;
    text-indent: 2em; margin-bottom: 24px;
    animation: fadeIn 0.9s ease 1.1s both;
  }

  .divider {
    width: 50px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(196,144,58,0.5), transparent);
    margin: 0 auto 20px;
    animation: fadeIn 0.7s ease 1.3s both;
  }

  .closing {
    text-align: center; font-size: 20px; line-height: 1.9;
    color: #3c2415; letter-spacing: 0.06em;
    font-family: 'STKaiti', 'KaiTi', '楷体', 'KaiTi SC', serif;
    animation: fadeIn 0.9s ease 1.4s both;
  }

  .signature {
    text-align: right; font-size: 18px; color: #6b4c3b; margin-top: 16px;
    letter-spacing: 0.06em;
    font-family: 'STKaiti', 'KaiTi', '楷体', 'KaiTi SC', serif;
    animation: fadeIn 0.8s ease 1.7s both;
  }

  .music-bar {
    display: flex; justify-content: center; margin-top: 20px;
    animation: fadeIn 0.8s ease 2s both;
  }

  .music-btn {
    background: rgba(196,144,58,0.1); border: 1px solid rgba(196,144,58,0.35);
    border-radius: 20px; padding: 8px 20px;
    font-size: 13px; color: #a07d3d; cursor: pointer; letter-spacing: 0.1em;
    font-family: inherit; transition: all 0.3s ease;
  }

  .music-btn:hover { background: rgba(196,144,58,0.2); }
  .music-btn.playing { background: rgba(196,144,58,0.2); border-color: #c9a96e; color: #8b6914; }

  .footer {
    text-align: center; margin-top: 28px;
    font-size: 12px; color: rgba(107,76,59,0.4); letter-spacing: 0.08em;
    animation: fadeIn 0.6s ease 2.2s both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 520px) {
    .card { padding: 32px 18px 28px; }
    .title { font-size: 38px; }
    .body-text { font-size: 15px; line-height: 1.95; }
    .carousel-wrap { max-width: 100%; }
  }

  @media (prefers-reduced-motion: reduce) {
    .card, .greeting, .title, .subtitle, .carousel-wrap, .carousel-dots,
    .body-text, .divider, .closing, .signature, .music-bar, .footer { animation: none; }
    .particles { display: none; }
  }
</style>
</head>

<script>
(function() {
  // Particles
  var container = document.getElementById('particles');
  for (var i = 0; i < 45; i++) {
    var p = document.createElement('div');
    p.className = 'particle';
    var size = Math.random() * 3 + 1;
    p.style.cssText =
      'width:' + size + 'px;height:' + size + 'px;' +
      'left:' + (Math.random() * 100) + '%;bottom:-10px;' +
      'animation-duration:' + (Math.random() * 10 + 10) + 's;' +
      'animation-delay:' + (Math.random() * 12) + 's;' +
      'animation-name:' + (Math.random() > 0.5 ? 'floatUp' : 'floatUpAlt') + ';';
    container.appendChild(p);
  }

  // Carousel
  var currentSlide = 0;
  var totalSlides = 3;
  var track = document.getElementById('carouselTrack');
  var dots = document.querySelectorAll('.carousel-dot');
  var slideTimer = null;

  function goToSlide(n) {
    currentSlide = (n + totalSlides) % totalSlides;
    track.style.transform = 'translateX(-' + (currentSlide * 100) + '%)';
    dots.forEach(function(d, i) { d.classList.toggle('active', i === currentSlide); });
  }

  function nextSlide() { goToSlide(currentSlide + 1); resetTimer(); }
  function resetTimer() { clearInterval(slideTimer); slideTimer = setInterval(nextSlide, 3500); }

  // Touch swipe
  var startX = 0;
  var wrap = document.querySelector('.carousel-wrap');
  wrap.addEventListener('touchstart', function(e) { startX = e.touches[0].clientX; }, {passive: true});
  wrap.addEventListener('touchend', function(e) {
    var diff = startX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 40) { diff > 0 ? nextSlide() : goToSlide(currentSlide - 1); resetTimer(); }
  });

  // Dot clicks
  dots.forEach(function(d) {
    d.addEventListener('click', function() { goToSlide(parseInt(this.dataset.index)); resetTimer(); });
  });

  resetTimer();

  // Music
  var musicPlaying = false;
  var bgm = document.getElementById('bgm');
  var musicBtn = document.getElementById('musicBtn');

  window.toggleMusic = function() {
    if (musicPlaying) {
      bgm.pause();
      musicBtn.classList.remove('playing');
      musicBtn.innerHTML = '♪ 背景音乐';
    } else {
      bgm.play().then(function() {
        musicBtn.classList.add('playing');
        musicBtn.innerHTML = '♫ 播放中';
      }).catch(function() {});
    }
    musicPlaying = !musicPlaying;
  };
})();
</script>
